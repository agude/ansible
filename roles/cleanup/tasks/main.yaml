---
# Enable the empty-downloads systemd user service.
# The service file is deployed by dotfiles — this just activates it.

- name: Reload systemd user daemon
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  become: true
  become_user: "{{ user }}"

- name: Enable empty-downloads service
  ansible.builtin.systemd:
    name: empty-downloads.service
    enabled: true
    state: started
    scope: user
  become: true
  become_user: "{{ user }}"
