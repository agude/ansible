---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Upgrade installed packages
  ansible.builtin.apt:
    upgrade: safe
  become: true

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
  become: true

- name: Install just from apt (Ubuntu only)
  ansible.builtin.apt:
    name: just
    state: present
  become: true
  when: ansible_facts['distribution'] == "Ubuntu"
