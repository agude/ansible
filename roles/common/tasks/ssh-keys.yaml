---
# Generate per-route ed25519 keys: id_ed25519_<self>_to_<target>.
# Uses ssh-keygen with `creates:` so existing keys (including
# passphrase-protected ones) are never touched.
#
# After generation, all pubkeys are fetched into the repo's pubkeys/
# directory. Runs unconditionally to backfill keys from prior runs.
# Commit and push to distribute to other machines.

- name: Ensure ~/.ssh exists
  ansible.builtin.file:
    path: "/home/{{ user }}/.ssh"
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0700"
  become: true

- name: Ensure ~/.ssh/sockets exists for ControlMaster
  ansible.builtin.file:
    path: "/home/{{ user }}/.ssh/sockets"
    state: directory
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0700"
  become: true

- name: Ensure outbound SSH keypairs exist
  ansible.builtin.command:
    cmd: >-
      ssh-keygen -t ed25519 -N '' -q
      -C "{{ user }}@{{ inventory_hostname }} -> {{ item }}"
      -f /home/{{ user }}/.ssh/id_ed25519_{{ inventory_hostname }}_to_{{ item }}
    creates: "/home/{{ user }}/.ssh/id_ed25519_{{ inventory_hostname }}_to_{{ item }}"
  become: true
  become_user: "{{ user }}"
  loop: "{{ ssh_outbound_targets | default([]) | difference([inventory_hostname]) }}"

# --- Collect all pubkeys into the repo (backfills prior runs) ---

- name: Fetch pubkeys into repo store
  ansible.builtin.fetch:
    src: "/home/{{ user }}/.ssh/id_ed25519_{{ inventory_hostname }}_to_{{ item }}.pub"
    dest: "{{ playbook_dir }}/pubkeys/{{ inventory_hostname }}_to_{{ item }}.pub"
    flat: true
  loop: "{{ ssh_outbound_targets | default([]) | difference([inventory_hostname]) }}"
  loop_control:
    label: "{{ inventory_hostname }}_to_{{ item }}"

# --- Write ~/.ssh/config ---

- name: Manage SSH config block for outbound routes
  ansible.builtin.blockinfile:
    path: "/home/{{ user }}/.ssh/config"
    create: true
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0600"
    marker: "# {mark} ANSIBLE MANAGED: outbound routes"
    insertbefore: BOF
    block: "{{ lookup('template', 'ssh_config_managed.j2') }}"
  become: true

- name: Manage SSH config block for general settings
  ansible.builtin.blockinfile:
    path: "/home/{{ user }}/.ssh/config"
    create: true
    owner: "{{ user }}"
    group: "{{ user }}"
    mode: "0600"
    marker: "# {mark} ANSIBLE MANAGED: general settings"
    block: "{{ lookup('template', 'ssh_config_general.j2') }}"
  become: true
