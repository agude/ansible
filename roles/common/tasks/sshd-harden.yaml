---
# SSH hardening based on current best practices.

- name: Get OpenSSH version
  ansible.builtin.command: ssh -V
  register: common_ssh_version_raw
  changed_when: false
  check_mode: false

- name: Parse OpenSSH major version
  ansible.builtin.set_fact:
    common_openssh_major: "{{ common_ssh_version_raw.stderr | regex_search('OpenSSH_(\\d+)', '\\1') | first | int }}"

- name: Create ssh-user group to restrict logins
  ansible.builtin.group:
    name: ssh-user
    state: present
  become: true

- name: Add user to ssh-user group
  ansible.builtin.user:
    name: "{{ user }}"
    append: true
    groups: ssh-user
    state: present
  become: true

- name: Remove ECDSA host key
  ansible.builtin.file:
    path: /etc/ssh/ssh_host_ecdsa_key
    state: absent
  become: true
  notify: Restart sshd

- name: Remove ECDSA host key (public)
  ansible.builtin.file:
    path: /etc/ssh/ssh_host_ecdsa_key.pub
    state: absent
  become: true

- name: Ensure sshd privilege separation directory exists
  ansible.builtin.file:
    path: /run/sshd
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Deploy hardened sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0644"
    validate: /usr/sbin/sshd -T -f %s
    backup: true
  become: true
  notify: Restart sshd

- name: Deploy hardened ssh_config
  ansible.builtin.template:
    src: ssh_config.j2
    dest: /etc/ssh/ssh_config
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  notify: Restart sshd

- name: Check for weak DH moduli (< 3072 bits)
  ansible.builtin.shell:
    cmd: set -o pipefail && awk '$5 < 3071 && !/^#/' /etc/ssh/moduli | head -1
    executable: /bin/bash
  become: true
  register: common_weak_moduli
  changed_when: false

- name: Remove weak DH moduli
  ansible.builtin.shell:
    cmd: awk '$5 >= 3071 || /^#/' /etc/ssh/moduli > /etc/ssh/moduli.safe && mv /etc/ssh/moduli.safe /etc/ssh/moduli
  become: true
  changed_when: true
  when: common_weak_moduli.stdout | length > 0
  notify: Restart sshd
