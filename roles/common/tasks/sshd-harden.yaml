---
# SSH hardening based on current best practices.

- name: Create ssh-user group to restrict logins
  ansible.builtin.group:
    name: ssh-user
    state: present
  become: true

- name: Add user to ssh-user group
  ansible.builtin.user:
    name: "{{ user }}"
    append: true
    groups: ssh-user
    state: present
  become: true

- name: Remove ECDSA host key
  ansible.builtin.file:
    path: /etc/ssh/ssh_host_ecdsa_key
    state: absent
  become: true
  notify: Restart sshd

- name: Remove ECDSA host key (public)
  ansible.builtin.file:
    path: /etc/ssh/ssh_host_ecdsa_key.pub
    state: absent
  become: true

- name: Deploy hardened sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0644"
    validate: /usr/sbin/sshd -T -f %s
    backup: true
  become: true
  notify: Restart sshd

- name: Deploy hardened ssh_config
  ansible.builtin.template:
    src: ssh_config.j2
    dest: /etc/ssh/ssh_config
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true
  notify: Restart sshd

- name: Remove weak DH moduli (< 3072 bits)
  ansible.builtin.shell:
    cmd: awk '$5 >= 3071' /etc/ssh/moduli > /etc/ssh/moduli.safe && mv /etc/ssh/moduli.safe /etc/ssh/moduli
  become: true
  changed_when: false
  notify: Restart sshd
