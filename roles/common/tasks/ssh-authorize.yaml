---
# Install incoming pubkeys from the repo store into authorized_keys.
# No machine-to-machine SSH needed — reads from pubkeys/ in the repo.
#
# Additive: removing a .pub from the repo stops installing it, but
# does not revoke existing entries. To revoke, delete the .pub and
# manually remove the line from authorized_keys on the target, or
# run: ssh target "sed -i '/source -> target/d' ~/.ssh/authorized_keys"
#
# Note: with_fileglob resolves on the controller (where the repo
# lives), not on the remote host.

- name: Authorize incoming pubkeys
  ansible.posix.authorized_key:
    user: "{{ user }}"
    state: present
    key: "{{ lookup('file', item) }}"
  loop: "{{ query('fileglob', playbook_dir ~ '/pubkeys/*_to_' ~ inventory_hostname ~ '.pub') }}"
  loop_control:
    label: "{{ item | basename }}"
  become: true
