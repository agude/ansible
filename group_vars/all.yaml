---
user: agude
dotfiles_repo: git@github.com:agude/dotfiles.git
dotfiles_profile: default

knowledge_repo: git@github.com:agude/knowledge-base-core.git
wiki_repo: git@github.com:agude/wiki-core.git

# Store in Ansible Vault:
#   ansible-vault encrypt_string '<token>' --name 'ubuntu_pro_token'
ubuntu_pro_token: "REPLACE_WITH_VAULT_ENCRYPTED_VALUE"

common_packages:
  - bat
  - curl
  - fzf
  - git
  - htop
  - jq
  - neovim
  - openssh-server
  - ripgrep
  - screen
  - tree
  - xxd
