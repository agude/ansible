---
name: Lint
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install ansible-lint yamllint

      - name: YAML lint
        run: yamllint -s .

      - name: Ansible syntax check
        run: ansible-playbook site.yaml --syntax-check

      - name: Ansible lint
        run: ansible-lint
